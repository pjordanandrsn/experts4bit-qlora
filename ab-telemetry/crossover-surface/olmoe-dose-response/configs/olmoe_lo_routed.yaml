# Qwen3-30B-A3B expert_offload A/B — derived from ab-telemetry/axolotl-ab/configs/single_*.yaml
# (OLMoE precedent, 2026-07-06). Arms differ ONLY by: expert_offload, output_dir, wandb_name.
# Deltas from that precedent: base_model (OLMoE -> Qwen3-30B-A3B), paths. Everything else identical.
base_model: allenai/OLMoE-1B-7B-0924
trust_remote_code: true

plugins:
  - axolotl.integrations.expert_offload.ExpertOffloadPlugin

expert_offload: true

load_in_8bit: false
load_in_4bit: true
# REQUIRED: default false leaves MoE experts UNQUANTIZED (bf16). On a 24GB card that OOMs
# loudly; on this 96GB card bf16 experts (~61GB) would FIT and silently invalidate the A/B.
quantize_moe_experts: true
adapter: qlora
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

datasets:
  - path: tatsu-lab/alpaca
    type: alpaca
dataset_prepared_path: /root/olmoe/prep_lo
val_set_size: 0.05
output_dir: /root/olmoe/outputs/olmoe_lo_routed

sequence_len: 256
sample_packing: true

gradient_accumulation_steps: 4
micro_batch_size: 1
num_epochs: 1
max_steps: 150
seed: 42
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 0.0001

bf16: auto
tf32: true
flash_attention: false

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

logging_steps: 1
warmup_ratio: 0.1
eval_steps: 50
save_strategy: "no"
weight_decay: 0.0
special_tokens:

wandb_project: expert-offload-qwen30b-sm120
wandb_name: olmoe_lo_routed
wandb_mode: offline
expert_offload_staging: routed
