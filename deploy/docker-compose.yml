# e4b-serve on the QNAP (Container Station). Layout convention:
#   /share/Container/e4b-serve/src       <- this repo (build context = repo root)
#   /share/Container/e4b-serve/hf-cache  <- HF snapshots (first boot downloads ~14 GB of OLMoE)
#   /share/Container/e4b-serve/adapters  <- trained adapter_*.pt files (read-only in-container)
# Bring up from the deploy dir's parent:
#   docker compose -f src/deploy/docker-compose.yml up -d --build
services:
  e4b-serve:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: e4b-serve
    # Docker's registered NVIDIA runtime name varies by host (stock: "nvidia"; QNAP Container
    # Station: "nvidia-runtime") — override in a .env file next to this compose file.
    runtime: ${E4B_GPU_RUNTIME:-nvidia}
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL=allenai/OLMoE-1B-7B-0924
      - R=8
      - ALPHA=16
      - QUANT_TYPE=nf4
      - OFFLOAD_EXPERTS=1
      - PREFETCH=1
      # name=path pairs; paths are in-container (the ./adapters volume below).
      # Example: E4B_ADAPTERS=alpaca=/adapters/adapter_best.pt
      - E4B_ADAPTERS=${E4B_ADAPTERS:-}
      - E4B_PORT=8777
      - E4B_QUEUE_MAX=2
      - E4B_MAX_INPUT_TOKENS=2048
      - E4B_MAX_NEW_TOKENS=256
      - E4B_REQUEST_TIMEOUT_S=600
      # One JSON line per generation (tokens, peak VRAM, wall, versions) -> ./receipts on the host.
      - E4B_RECEIPTS_PATH=/receipts/runs.jsonl
    ports:
      - "8777:8777"
    volumes:
      - ../../hf-cache:/root/.cache/huggingface
      - ../../adapters:/adapters:ro
      - ../../receipts:/receipts
    ulimits:
      # Required: the offload homes must pin (mlock) ~5 GB for OLMoE. Without this the pin
      # silently falls back to pageable and decode drops from 1.44 to ~0.4 tok/s.
      memlock: -1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8777/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      # First boot = 14 GB download + streaming NF4 load + warmup; don't flap before it's done.
      start_period: 900s

  # Optional second endpoint: a big-MoE "capability" model — offload-only on a 12 GB card
  # (~4.4 GB GPU @ ~0.22 tok/s decode: batch-quality jobs, not chat). One base model per
  # process/container by design. Opt in with: docker compose --profile qwen up -d
  e4b-serve-qwen:
    profiles: ["qwen"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: e4b-serve-qwen
    runtime: ${E4B_GPU_RUNTIME:-nvidia}
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL=Qwen/Qwen3-30B-A3B
      - R=8
      - ALPHA=16
      - QUANT_TYPE=nf4
      - OFFLOAD_EXPERTS=1
      - PREFETCH=1
      - E4B_PORT=8781
      - E4B_QUEUE_MAX=2
      - E4B_MAX_INPUT_TOKENS=2048
      # At ~0.22 tok/s a long reply takes minutes — cap output, stretch the deadline.
      - E4B_MAX_NEW_TOKENS=192
      - E4B_REQUEST_TIMEOUT_S=1800
    ports:
      - "8781:8781"
    volumes:
      - ../../hf-cache:/root/.cache/huggingface
    ulimits:
      memlock: -1  # ~15 GB of 4-bit experts must pin (see the note on the primary service)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8781/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      # First boot = ~60 GB download + streaming NF4 quantize of a 30B — give it a full hour.
      start_period: 3600s

  # Optional featherweight endpoint: Granite-3.0-1B-A400M (needs the loader's granitemoe
  # support — build from a branch that includes it). Fast for its size (~4.3 tok/s @ ~0.4 GB
  # peak on an A2000): the "cheap local text jobs" tier. Opt in: docker compose --profile granite up -d
  e4b-serve-granite:
    profiles: ["granite"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: e4b-serve-granite
    runtime: ${E4B_GPU_RUNTIME:-nvidia}
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL=ibm-granite/granite-3.0-1b-a400m-instruct
      - R=8
      - ALPHA=16
      - QUANT_TYPE=nf4
      - OFFLOAD_EXPERTS=1
      - PREFETCH=1
      - E4B_PORT=8783
      - E4B_QUEUE_MAX=2
      - E4B_MAX_INPUT_TOKENS=2048
      - E4B_MAX_NEW_TOKENS=256
      - E4B_REQUEST_TIMEOUT_S=600
    ports:
      - "8783:8783"
    volumes:
      - ../../hf-cache:/root/.cache/huggingface
      - ../../adapters:/adapters:ro
    ulimits:
      memlock: -1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8783/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      # ~2.6 GB download + a small streaming load; generous anyway.
      start_period: 900s
