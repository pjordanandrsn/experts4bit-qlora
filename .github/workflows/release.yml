name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token/secret.
# Requires a PyPI trusted publisher for project `experts4bit-qlora` configured with:
#   owner: pjordanandrsn | repo: experts4bit-qlora | workflow: release.yml
# Trigger by pushing a version tag, e.g.  git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ["v*"]

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token PyPI trusts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: built-artifact smoke (blocks publish)
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install --quiet dist/*.whl \
            torch --extra-index-url https://download.pytorch.org/whl/cpu
          cp scripts/wheel_smoke.py /tmp/
          cd /tmp && ./venv/bin/python wheel_smoke.py
      - name: README link check (real tag URLs)
        run: python scripts/check_readme_links.py
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
