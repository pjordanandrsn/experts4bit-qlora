name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token/secret.
# Requires a PyPI trusted publisher for project `experts4bit-qlora` configured with:
#   owner: pjordanandrsn | repo: experts4bit-qlora | workflow: release.yml
# Trigger by pushing a version tag, e.g.  git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ["v*"]

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token PyPI trusts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
