name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (CPU torch — GPU loader tests auto-skip on a CPU runner)
        run: |
          python -m pip install --upgrade pip ruff
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[test]"
      - name: Lint
        run: ruff check experts4bit_qlora tests
      - name: Test
        run: pytest tests/ -q
