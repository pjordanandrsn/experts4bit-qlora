name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (CPU torch — GPU loader tests auto-skip on a CPU runner)
        run: |
          python -m pip install --upgrade pip ruff
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[test]"
      - name: Lint
        run: ruff check experts4bit_qlora tests scripts
      - name: Test
        run: pytest tests/ -q

  wheel-smoke:
    # Built-artifact gate (release-repair directive): README's promised surface
    # must equal the wheel's importable surface. scripts/wheel_smoke.py runs
    # from /tmp against a clean-venv wheel install; the link check maps the
    # release tag to main pre-tag (the tag exists only at release time).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build
        run: |
          python -m pip install --quiet --upgrade pip build
          python -m build
      - name: install wheel into clean venv
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install --quiet dist/*.whl \
            torch --extra-index-url https://download.pytorch.org/whl/cpu
      - name: import battery + micros + deprecation check (from the wheel)
        run: |
          cp scripts/wheel_smoke.py /tmp/
          cd /tmp && ./venv/bin/python wheel_smoke.py
      - name: README link check (tag mapped to main pre-release)
        run: |
          TAG=$(python -c "import tomllib; print('v'+tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          python scripts/check_readme_links.py --map-ref "$TAG" main
